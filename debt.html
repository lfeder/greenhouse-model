<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt & PE/DD Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .summary-grid { display: grid; gap: 8px; margin-bottom: 8px; }
  .summary-grid.pedd { grid-template-columns: repeat(4, 1fr); }
  .summary-grid.loans { grid-template-columns: repeat(3, 1fr); }
  .summary-item { background: var(--panel-dark); border-radius: 5px; padding: 8px 12px; }
  .summary-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .summary-detail { font-size: 9px; color: var(--text-dim); margin-top: 2px; }
  .summary-value { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">Debt & PE/DD Schedule</div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <div class="nav-links">
        <a href="index.html">Expansion</a>
        <a href="debt.html" class="active">Debt</a>
        <a href="depreciation.html">Depreciation</a>
        <a href="distributions.html">Distributions</a>
      </div>
      <button id="saveBtn" onclick="saveLoad.save()" class="btn">save</button>
      <button onclick="toggleTheme()" class="btn" id="themeToggle">light</button>
      <div id="versionLabel" style="font-size:10px;color:var(--text)"></div>
    </div>
  </div>
</div>

<div style="max-width:1200px;margin:0 auto;padding:20px 32px">
  <div style="display:flex;gap:16px;margin-bottom:16px">
    <div class="panel" style="flex:0 0 280px">
      <div class="panel-title">PE/DD Settings</div>
      <div id="sl-tBillRate"></div>
    </div>
    <div style="flex:1">
      <div class="panel-title" style="margin-bottom:8px">Instrument Summary</div>
      <div id="instrumentSummary"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Consolidated Repayment Schedule ($K)</div>
    <div style="overflow-x:auto">
      <table class="fin-table" id="scheduleTable"></table>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const state = { tBillRate: 4 };
window._pageState = state;
const saveLoad = makeSaveLoad('gh-debt-state', state);
saveLoad.load();

function recalc() {
  const tBillRate = state.tBillRate / 100;

  // Loan schedules
  const { loanData, totalInt, totalPrin, totalDS } = computeLoanSchedules();

  // PE/DD — read from distributions page (single source of truth for waterfall)
  let peddDetail = {};
  try {
    const d = JSON.parse(localStorage.getItem('gh-pedd-detail'));
    for (const inst of d.instruments) peddDetail[inst.name] = inst;
  } catch(e) {
    for (const pe of PEDD_INSTRUMENTS) peddDetail[pe.name] = { prinPaid: YEARS.map(() => 0), intPaid: YEARS.map(() => 0), endBal: YEARS.map(() => pe.balance), intOwed: YEARS.map(() => 0) };
  }

  const allPEDD = [...PEDD_INSTRUMENTS.map(pe => pe.name), 'T1Short'];
  const totalPEDDPrin = YEARS.map((_, i) => allPEDD.reduce((s, name) => s + (peddDetail[name]?.prinPaid[i] || 0), 0));
  const totalPEDDInt = YEARS.map((_, i) => allPEDD.reduce((s, name) => s + (peddDetail[name]?.intPaid[i] || 0), 0));

  // Summary cards — PE/DD first, loans second
  let summaryHTML = '<div class="summary-grid pedd">';
  for (const pe of PEDD_INSTRUMENTS) {
    const rate = pe.rateType === 'tbill' ? tBillRate + pe.rateSpread : (pe.rate || 0);
    summaryHTML += `<div class="summary-item">
      <div class="summary-label">${pe.label} (#${pe.order})</div>
      <div class="summary-detail">${rate > 0 ? (rate * 100).toFixed(1) + '%' : 'no interest'} · ${fmtK(pe.balance)} bal</div>
      <div class="summary-value">via waterfall</div>
    </div>`;
  }
  summaryHTML += '</div><div class="summary-grid loans">';
  for (const loan of LOANS) {
    const sched = loan.annualSchedule(2026);
    summaryHTML += `<div class="summary-item">
      <div class="summary-label">${loan.name}</div>
      <div class="summary-detail">${(loan.rate * 100).toFixed(2)}% · ${fmtK(loan.startBal)} bal · matures ${loan.maturity}</div>
      <div class="summary-value">${fmtK(sched.interest + sched.principal)}/yr</div>
    </div>`;
  }
  summaryHTML += '</div>';
  document.getElementById('instrumentSummary').innerHTML = summaryHTML;

  // Table — PE/DD first, loans below
  const row = (label, data, cls) => tableRow(label, data, fmtCellK, cls);

  let html = `<thead><tr><th></th>${yearHeaders()}</tr></thead><tbody>`;

  // PE/DD
  const t1Short = peddDetail['T1Short'];
  const hasT1Short = t1Short && t1Short.endBal.some(v => v > 50);

  html += sectionRow('PE/DD Principal Repayment (via Waterfall)');
  for (const pe of PEDD_INSTRUMENTS) html += row(pe.label, peddDetail[pe.name].prinPaid.map(v => -v));
  if (hasT1Short) html += row('T1 Shortfall DD', t1Short.prinPaid.map(v => -v));
  html += row('Total PE/DD Principal', totalPEDDPrin.map(v => -v), 'subtotal-row');

  html += sectionRow('PE/DD Interest Paid');
  for (const pe of PEDD_INSTRUMENTS) {
    const rate = pe.rateType === 'tbill' ? tBillRate + pe.rateSpread : (pe.rate || 0);
    if (rate > 0) html += row(`${pe.label} (${(rate * 100).toFixed(1)}%)`, peddDetail[pe.name].intPaid.map(v => -v));
  }
  html += row('Total PE/DD Interest', totalPEDDInt.map(v => -v), 'subtotal-row');

  html += sectionRow('PE/DD Balances (End of Year)');
  for (const pe of PEDD_INSTRUMENTS) html += balRow(pe.label, peddDetail[pe.name].endBal);
  if (hasT1Short) html += balRow('T1 Shortfall DD', t1Short.endBal);

  const hasIntOwed = PEDD_INSTRUMENTS.some(pe => peddDetail[pe.name].intOwed.some(v => v > 50));
  if (hasIntOwed) {
    html += sectionRow('PE/DD Accrued Interest Owed');
    for (const pe of PEDD_INSTRUMENTS) {
      if (peddDetail[pe.name].intOwed.some(v => v > 50)) html += balRow(pe.label, peddDetail[pe.name].intOwed);
    }
  }

  // Loans
  html += sectionRow('Loan Interest');
  for (const loan of LOANS) html += row(loan.name, loanData[loan.name].interest.map(v => -v));
  html += row('Total Interest', totalInt.map(v => -v), 'subtotal-row');

  html += sectionRow('Loan Principal');
  for (const loan of LOANS) html += row(loan.name, loanData[loan.name].principal.map(v => -v));
  html += row('Total Principal', totalPrin.map(v => -v), 'subtotal-row');

  html += row('Total Debt Service', totalDS.map(v => -v), 'total-row-table');

  html += sectionRow('Loan Balances (End of Year)');
  for (const loan of LOANS) html += balRow(loan.name, loanData[loan.name].endBal);

  html += '</tbody>';
  document.getElementById('scheduleTable').innerHTML = html;

  // Save for other pages
  localStorage.setItem('gh-debt-schedule', JSON.stringify({ years: YEARS, loanInterest: totalInt, loanPrincipal: totalPrin, totalDS }));
}

// Init
initTheme();
document.getElementById('versionLabel').textContent = 'v 03-28 06:00';
createSlider('sl-tBillRate', 'tBillRate', state, {
  label: '3-Mo T-Bill Rate', min: 2, max: 6, step: 0.5,
  format: v => `${v.toFixed(1)}%`,
  sublabel: () => `PE3 rate: ${(state.tBillRate + 2.5).toFixed(1)}%`
});
recalc();
</script>
</body>
</html>
