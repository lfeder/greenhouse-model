<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenhouse Expansion Financial Model</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --text: #f2faf2; --text-sub: #b8d8b8; --text-muted: #7aaa7a; --text-dim: #4a7a4a;
    --green: #7dd17a; --green-bright: #9adf97; --red: #e08888; --yellow: #e0c860;
    --border: #2a4a2a; --bg: #0d1a0d; --panel: #111f11; --panel-dark: #090f09; --accent: #5a9e55;
    --header-bg: linear-gradient(135deg, #0d1a0d, #162816, #0d1a0d);
    --slider-track: #243624; --slider-fill: #5a9e55; --slider-thumb: #5a9e55; --slider-thumb-border: #0d1a0d;
    --chart-grid: #162416; --chart-tick: #4a7a4a;
  }
  body.light {
    --text: #1a2a1a; --text-sub: #2a4a2a; --text-muted: #3a6a3a; --text-dim: #7a9a7a;
    --green: #3a8a38; --green-bright: #2a7a28; --red: #b84040; --yellow: #a08820;
    --border: #b0b8b0; --bg: #e0e2e0; --panel: #eaecea; --panel-dark: #d4d6d4; --accent: #3a7a38;
    --header-bg: linear-gradient(135deg, #d4d6d4, #e0e2e0, #d4d6d4);
    --slider-track: #a8cca8; --slider-fill: #3a7a38; --slider-thumb: #3a7a38; --slider-thumb-border: #d8e4d8;
    --chart-grid: #c0ccc0; --chart-tick: #5a7a5a;
  }
  body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; padding-bottom: 60px; }

  .header { background: var(--header-bg); border-bottom: 1px solid var(--border); padding: 22px 32px 18px; }
  .header-inner { max-width: 1060px; margin: 0 auto; }
  .header-sub { font-size: 9px; letter-spacing: 0.22em; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--text); }

  .layout { max-width: 1060px; margin: 0 auto; padding: 20px 32px 0; display: grid; grid-template-columns: 280px 1fr; gap: 22px; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .panel-title { font-size: 9px; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; margin-bottom: 0; font-weight: 700; }

  .slider-group { margin-bottom: 0; padding-top: 10px; }
  .slider-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0; }
  .slider-label { font-size: 10px; letter-spacing: 0.08em; color: var(--text-sub); text-transform: uppercase; line-height: 1; }
  .slider-sublabel { font-size: 9px; color: var(--text-muted); margin-top: 1px; line-height: 1.1; }
  .slider-sublabel:empty { display: none; }
  .slider-value { font-size: 14px; color: var(--text); font-weight: 700; white-space: nowrap; flex-shrink: 0; line-height: 1; }

  input[type=range] { width: 100%; appearance: none; -webkit-appearance: none; height: 3px; border-radius: 2px; outline: none; cursor: pointer; margin-top: 7px; margin-bottom: 0; padding: 0; display: block; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--slider-thumb); cursor: pointer; border: 2px solid var(--slider-thumb-border); }
  input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--slider-thumb); cursor: pointer; border: 2px solid var(--slider-thumb-border); }

  .total-row { display: flex; justify-content: space-between; background: var(--panel-dark); border-radius: 5px; padding: 7px 11px; margin-top: 4px; }
  .total-row .label { font-size: 10px; color: var(--text-sub); }
  .total-row .value { font-size: 15px; font-weight: 700; color: var(--text); }

  .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 9px; margin-bottom: 9px; }
  .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 7px; padding: 11px 12px; }
  .kpi-label { font-size: 9px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; text-align: right; }
  .kpi-value { font-size: 17px; font-weight: 700; line-height: 1; color: var(--text); text-align: right; }
  .kpi-sub { font-size: 9px; color: var(--text-dim); margin-top: 4px; text-align: right; }

  .chart-panel { margin-bottom: 18px; padding: 14px 0; }
  #tablePanel { padding: 14px 0; }
  .chart-legend { display: flex; gap: 20px; margin-top: 10px; font-size: 10px; color: var(--text-muted); }
  .legend-box { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; }



  .fin-table { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'DM Mono', monospace; }
  .fin-table th { font-size: 14px; letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase; text-align: right; padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 700; }
  .fin-table th:first-child { text-align: left; }
  .fin-table td { text-align: right; padding: 5px 8px; border-bottom: 1px solid #1a2e1a; color: var(--text-sub); }
  .fin-table td:first-child { text-align: left; color: var(--text-muted); }
  .fin-table tr.section-header td { color: var(--accent); font-weight: 700; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding-top: 12px; border-bottom: 1px solid var(--border); }
  .fin-table tr.total-row-table td { color: var(--text); font-weight: 700; border-top: 1px solid var(--border); border-bottom: 2px solid var(--border); }
  .fin-table tr.subtotal-row td { color: var(--green); font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .fin-table .neg { color: var(--red); }

  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner" style="display:flex;justify-content:space-between;align-items:baseline">
    <div class="header-title">Greenhouse Expansion Financial Model</div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <button id="saveBtn" onclick="saveModel()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-family:inherit;font-size:10px;padding:3px 8px;cursor:pointer">save model</button>
      <button id="themeToggle" onclick="toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-family:inherit;font-size:10px;padding:3px 8px;cursor:pointer">light</button>
      <div style="font-size:10px;color:var(--text-dim)">v 03-10 08:33</div>
    </div>
  </div>
</div>

<div class="layout">
  <div id="inputs">
    <div class="panel">
      <div class="panel-title">Production</div>
      <div id="sl-currentDailyLbs"></div>
      <div id="sl-numGH"></div>
      <div id="sl-pricePerLb"></div>
      <div id="sl-profitMargin"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Financing</div>
      <div id="sl-financingPct"></div>
      <div id="sl-interestRate"></div>
      <div id="sl-loanTermYears"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Timeline &amp; Inflation</div>
      <div id="sl-constructionStartQ"></div>
      <div id="sl-constructionMonths"></div>
      <div id="sl-rampYears"></div>
      <div id="sl-revInflation"></div>
      <div id="sl-costInflation"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Capital Projects</div>
      <div id="sl-constructionCost"></div>
      <div id="sl-packhouseCost"></div>
      <div id="sl-housingCost"></div>
      <div id="sl-cukeAutomation"></div>
      <div id="sl-refurbJTL"></div>
      <div id="sl-regainGH1"></div>
    </div>
  </div>

  <div style="min-width:0">
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi"><div class="kpi-label">Total Cost</div><div class="kpi-value" id="kpi-totalCost"></div><div class="kpi-sub" id="kpi-totalCost-sub"></div></div>
      <div class="kpi"><div class="kpi-label">Equity</div><div class="kpi-value" id="kpi-equity"></div><div class="kpi-sub" id="kpi-equity-sub"></div></div>
      <div class="kpi"><div class="kpi-label">Annual Revenue</div><div class="kpi-value" id="kpi-revenue"></div><div class="kpi-sub" id="kpi-revenue-sub"></div></div>
      <div class="kpi"><div class="kpi-label">Op Inc</div><div class="kpi-value" id="kpi-opIncome"></div><div class="kpi-sub" id="kpi-opIncome-sub"></div></div>
      <div class="kpi"><div class="kpi-label">Debt Srvc</div><div class="kpi-value" id="kpi-debtSvc"></div><div class="kpi-sub" id="kpi-debtSvc-sub"></div></div>
      <div class="kpi"><div class="kpi-label">Net CF</div><div class="kpi-value" id="kpi-netCF"></div><div class="kpi-sub" id="kpi-netCF-sub"></div></div>
    </div>

    <div class="panel chart-panel">
      <div style="position:relative;height:255px"><canvas id="chart"></canvas></div>
      <div class="chart-legend">
        <span><span class="legend-box" style="background:#4a8acc"></span>Existing Net CF</span>
        <span><span class="legend-box" style="background:#5aaa55"></span>New GH Net CF</span>
      </div>
    </div>

    <div class="panel" id="tablePanel">
      <div style="overflow-x:auto">
        <table class="fin-table" id="finTable"></table>
      </div>
    </div>
  </div>
</div>

<script>
const SQFT_PER_GH = 60000;
const ACRES_PER_GH = SQFT_PER_GH / 43560; // ~1.377 acres
const CURRENT_ACRES = 12;
const OPERATING_DAYS = 365;

const QUARTERS = [];
for (let y = 2025; y <= 2029; y++) {
  for (let q = 1; q <= 4; q++) {
    QUARTERS.push({ value: y * 10 + q, label: `Q${q}-${String(y).slice(2)}` });
  }
}

const state = {
  currentDailyLbs: 10000, numGH: 3, pricePerLb: 4.00, profitMargin: 30,
  constructionCost: 4500000, packhouseCost: 1500000, housingCost: 0, cukeAutomation: 0, refurbJTL: 0, regainGH1: 0,
  financingPct: 80, interestRate: 7, loanTermYears: 7,
  constructionStartQ: 20263, constructionMonths: 12,
  rampYears: 2,
  revInflation: 4, costInflation: 3
};

const EXISTING_REV_BASE = 14500000;
const EXISTING_EXP_BASE = 9600000;
const EXISTING_DEBT_HIGH = 1750000;
const EXISTING_DEBT_LOW = 420000;
const EXISTING_DEBT_CUTOFF = 2031;
const EXISTING_FCF_BASE = 2500000;
const EXISTING_FCF_GROWTH = 500000;

// Formatters — use - for negatives, no ()
const fmt = (n) => {
  if (n == null || isNaN(n)) return "\u2014";
  const abs = Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return n < 0 ? `-${abs}` : abs;
};
const fmtK = (n) => {
  if (n == null || isNaN(n)) return "\u2014";
  const abs = Math.abs(n);
  const sign = n < 0 ? "-" : "";
  if (abs >= 1e6) return `${sign}${(abs / 1e6).toFixed(1)}M`;
  if (abs >= 1e3) return `${sign}${(abs / 1e3).toFixed(0)}K`;
  return fmt(n);
};
const fmtM = (n) => {
  if (n == null || isNaN(n)) return "\u2014";
  const sign = n < 0 ? "-" : "";
  return `${sign}${(Math.abs(n) / 1e6).toFixed(1)}`;
};
const fmtLbs = (n) => `${Math.round(n).toLocaleString()} lb`;
const pct = (n) => `${Number(n).toFixed(1)}%`;

function qLabel(qVal) {
  const y = Math.floor(qVal / 10);
  const q = qVal % 10;
  return `Q${q}-${String(y).slice(2)}`;
}

function snapToQuarter(val) {
  let closest = QUARTERS[0].value;
  let minDist = Math.abs(val - closest);
  for (const q of QUARTERS) {
    const d = Math.abs(val - q.value);
    if (d < minDist) { minDist = d; closest = q.value; }
  }
  return closest;
}

function sliderBg(pct) {
  const s = getComputedStyle(document.documentElement);
  const fill = s.getPropertyValue('--slider-fill').trim();
  const track = s.getPropertyValue('--slider-track').trim();
  return `linear-gradient(to right,${fill} 0%,${fill} ${pct}%,${track} ${pct}%,${track} 100%)`;
}

function createSlider(containerId, key, opts) {
  const container = document.getElementById(containerId);
  const fill = ((state[key] - opts.min) / (opts.max - opts.min)) * 100;
  container.innerHTML = `
    <div class="slider-group">
      <div class="slider-header">
        <div style="flex:1;padding-right:10px">
          <div class="slider-label">${opts.label}</div>
          <div class="slider-sublabel" id="${key}-sublabel">${opts.sublabel ? opts.sublabel() : ''}</div>
        </div>
        <span class="slider-value" id="${key}-display">${opts.format(state[key])}</span>
      </div>
      <input type="range" id="${key}" min="${opts.min}" max="${opts.max}" step="${opts.step}" value="${state[key]}">
    </div>`;
  const input = document.getElementById(key);
  input.style.background = sliderBg(fill);
  input.addEventListener('input', (e) => {
    let val = Number(e.target.value);
    if (opts.snap) val = opts.snap(val);
    state[key] = val;
    input.value = val;
    const pct = ((val - opts.min) / (opts.max - opts.min)) * 100;
    input.style.background = sliderBg(pct);
    document.getElementById(`${key}-display`).textContent = opts.format(val);
    if (opts.sublabel) document.getElementById(`${key}-sublabel`).innerHTML = opts.sublabel();
    recalc();
  });
}

// Ramp factor: linear ramp over rampYears (1-3)
function rampFactor(prodYr, rampYears) {
  // prodYr is 1-indexed production year
  if (rampYears <= 1) return prodYr >= 1 ? (prodYr === 1 ? 0.70 : 1.0) : 0;
  if (rampYears === 2) return prodYr === 1 ? 0.50 : prodYr === 2 ? 0.85 : 1.0;
  // 3 years
  return prodYr === 1 ? 0.40 : prodYr === 2 ? 0.65 : prodYr === 3 ? 0.85 : 1.0;
}

function getConstructionEndQ() {
  const sY = Math.floor(state.constructionStartQ / 10);
  const sQ = state.constructionStartQ % 10;
  const addQ = Math.ceil(state.constructionMonths / 3);
  let eQ = sQ + addQ;
  let eY = sY;
  while (eQ > 4) { eQ -= 4; eY++; }
  return eY * 10 + eQ;
}

function buildSliders() {
  createSlider('sl-currentDailyLbs', 'currentDailyLbs', {
    label: 'Current Production', min: 6000, max: 15000, step: 500,
    format: v => `${v.toLocaleString()} lb/day`
  });
  createSlider('sl-numGH', 'numGH', {
    label: 'New 60K SF Greenhouses', min: 0, max: 4, step: 1,
    format: v => `${v} GH`
  });
  createSlider('sl-pricePerLb', 'pricePerLb', {
    label: 'Price per lb', min: 3.00, max: 6.00, step: 0.05,
    format: v => v.toFixed(2)
  });
  createSlider('sl-profitMargin', 'profitMargin', {
    label: 'Operating Margin', min: 15, max: 55, step: 1,
    format: v => `${v}%`
  });
  createSlider('sl-constructionCost', 'constructionCost', {
    label: 'Greenhouse Build', min: 3000000, max: 8000000, step: 250000,
    format: v => `${(v / 1e6).toFixed(2)}M`
  });
  createSlider('sl-packhouseCost', 'packhouseCost', {
    label: 'Packhouse Cost', min: 0, max: 3000000, step: 250000,
    format: v => v === 0 ? 'None' : `${(v / 1e6).toFixed(2)}M`
  });
  createSlider('sl-housingCost', 'housingCost', {
    label: 'Housing', min: 0, max: 2000000, step: 250000,
    format: v => v === 0 ? 'None' : `${(v / 1e6).toFixed(2)}M`
  });
  createSlider('sl-cukeAutomation', 'cukeAutomation', {
    label: 'Cuke Automation', min: 0, max: 1000000, step: 50000,
    format: v => v === 0 ? 'None' : `${(v / 1e6).toFixed(2)}M`
  });
  createSlider('sl-refurbJTL', 'refurbJTL', {
    label: 'Refurb JTL', min: 0, max: 1000000, step: 50000,
    format: v => v === 0 ? 'None' : `${(v / 1e6).toFixed(2)}M`
  });
  createSlider('sl-regainGH1', 'regainGH1', {
    label: 'Regain GH1 Grow', min: 0, max: 100000, step: 10000,
    format: v => v === 0 ? 'None' : `${(v / 1e3).toFixed(0)}K`
  });
  createSlider('sl-financingPct', 'financingPct', {
    label: 'Loan-to-Cost', min: 50, max: 90, step: 5,
    format: v => `${v}%`
  });
  createSlider('sl-interestRate', 'interestRate', {
    label: 'Interest Rate', min: 6, max: 8, step: 0.25,
    format: v => `${v.toFixed(2)}%`
  });
  createSlider('sl-loanTermYears', 'loanTermYears', {
    label: 'Loan Term', min: 7, max: 25, step: 1,
    format: v => `${v} yr`
  });

  const qMin = QUARTERS[0].value;
  const qMax = QUARTERS[QUARTERS.length - 1].value;
  createSlider('sl-constructionStartQ', 'constructionStartQ', {
    label: 'Construction Start', min: qMin, max: qMax, step: 1,
    format: v => qLabel(v), snap: snapToQuarter
  });
  createSlider('sl-constructionMonths', 'constructionMonths', {
    label: 'Construction Duration', min: 6, max: 24, step: 3,
    format: v => `${v} mo`,
    sublabel: () => {
      const endQ = getConstructionEndQ();
      return `complete ${qLabel(endQ)}`;
    }
  });
  createSlider('sl-rampYears', 'rampYears', {
    label: 'Production Ramp', min: 1, max: 3, step: 1,
    format: v => `${v} yr`,
    sublabel: () => {
      const ry = state.rampYears;
      if (ry === 1) return 'Yr1: 70% \u00b7 Yr2+: 100%';
      if (ry === 2) return 'Yr1: 50% \u00b7 Yr2: 85% \u00b7 Yr3+: 100%';
      return 'Yr1: 40% \u00b7 Yr2: 65% \u00b7 Yr3: 85% \u00b7 Yr4+: 100%';
    }
  });
  createSlider('sl-revInflation', 'revInflation', {
    label: 'Revenue Escalation', min: 0, max: 8, step: 0.5,
    format: v => `${v.toFixed(1)}%/yr`
  });
  createSlider('sl-costInflation', 'costInflation', {
    label: 'Cost Escalation', min: 0, max: 8, step: 0.5,
    format: v => `${v.toFixed(1)}%/yr`
  });
}

let chart = null;

function recalc() {
  const s = state;
  const yieldPerAcreDay = s.currentDailyLbs / CURRENT_ACRES;
  const newAcres = s.numGH * ACRES_PER_GH;
  const dailyProduction = newAcres * yieldPerAcreDay;
  const annualProduction = dailyProduction * OPERATING_DAYS;
  const annualRevenue = annualProduction * s.pricePerLb;
  const annualOpEx = annualRevenue * (1 - s.profitMargin / 100);
  const operatingIncome = annualRevenue - annualOpEx;
  const totalCost = s.constructionCost + s.packhouseCost + s.housingCost + s.cukeAutomation + s.refurbJTL + s.regainGH1;
  const loanAmt = totalCost * (s.financingPct / 100);
  const equity = totalCost - loanAmt;
  const mRate = s.interestRate / 100 / 12;
  const nPmt = s.loanTermYears * 12;
  const monthlyPmt = loanAmt > 0 && mRate > 0
    ? loanAmt * (mRate * Math.pow(1 + mRate, nPmt)) / (Math.pow(1 + mRate, nPmt) - 1)
    : loanAmt > 0 ? loanAmt / nPmt : 0;
  const annualDebtSvc = monthlyPmt * 12;
  const netCashFlow = operatingIncome - annualDebtSvc;

  // DSCR: combined existing + new operating income / combined debt service
  // Use steady-state year 1 for existing
  const existOpInc1 = EXISTING_REV_BASE - EXISTING_EXP_BASE;
  const existDebt1 = EXISTING_DEBT_HIGH;
  const combinedOpInc = existOpInc1 + operatingIncome;
  const combinedDebt = existDebt1 + annualDebtSvc;
  const dscr = combinedDebt > 0 ? combinedOpInc / combinedDebt : 99;

  const payback = operatingIncome > 0 ? totalCost / operatingIncome : 99;

  // KPIs
  document.getElementById('kpi-totalCost').textContent = fmt(totalCost);
  document.getElementById('kpi-totalCost-sub').textContent = `GH + packhouse`;
  document.getElementById('kpi-equity').textContent = fmt(equity);
  document.getElementById('kpi-equity-sub').textContent = `${100 - s.financingPct}% of cost`;
  document.getElementById('kpi-revenue').textContent = fmt(annualRevenue);
  document.getElementById('kpi-revenue-sub').textContent = `${fmtLbs(dailyProduction)}/day`;
  document.getElementById('kpi-opIncome').textContent = fmt(operatingIncome);
  document.getElementById('kpi-opIncome-sub').textContent = `${pct(s.profitMargin)} margin`;
  document.getElementById('kpi-debtSvc').textContent = fmt(annualDebtSvc);
  document.getElementById('kpi-debtSvc-sub').textContent = `${fmt(monthlyPmt)}/mo`;
  document.getElementById('kpi-netCF').textContent = fmt(netCashFlow);

  const constructionEndQ = getConstructionEndQ();
  const endYear = Math.floor(constructionEndQ / 10);
  const endQ = constructionEndQ % 10;
  const prodOpenYear = endYear;
  const quartersProducing = 4 - endQ;
  const firstYearProdFrac = quartersProducing / 4;

  const startYear = Math.floor(s.constructionStartQ / 10);

  // Chart + table data: 2026-2033
  const chartStartYear = 2026;
  const chartEndYear = 2035;
  const labels = [], existNetCFs = [], newNetCFs = [];

  for (let year = chartStartYear; year <= chartEndYear; year++) {
    const yrIdx = year - chartStartYear;
    labels.push(`'${String(year).slice(2)}`);

    // Existing business net CF
    const eRev = EXISTING_REV_BASE * Math.pow(1 + s.revInflation / 100, yrIdx);
    const eExp = EXISTING_EXP_BASE * Math.pow(1 + s.costInflation / 100, yrIdx);
    const eDebt = year <= EXISTING_DEBT_CUTOFF ? EXISTING_DEBT_HIGH : EXISTING_DEBT_LOW;
    existNetCFs.push(eRev - eExp - eDebt);

    // New GH net CF
    const prodYr = year - prodOpenYear;
    let ghNetCF = 0;

    if (year >= startYear && year < prodOpenYear) {
      const cYears = prodOpenYear - startYear;
      if (cYears > 0) ghNetCF = -(equity / cYears);
    } else if (prodYr >= 0) {
      const actualProdYr = prodYr + 1;
      let r = rampFactor(actualProdYr, s.rampYears);
      if (prodYr === 0 && firstYearProdFrac < 1) r *= firstYearProdFrac;
      const revMult = Math.pow(1 + s.revInflation / 100, prodYr);
      const cstMult = Math.pow(1 + s.costInflation / 100, prodYr);
      const rev = annualRevenue * r * revMult;
      const opex = annualOpEx * r * cstMult;
      const ghOpIncome = rev - opex;
      const loanYr = year - prodOpenYear + 1;
      let ghDebt = loanYr <= s.loanTermYears ? annualDebtSvc : 0;
      if (prodYr === 0 && firstYearProdFrac < 1) ghDebt *= firstYearProdFrac;
      ghNetCF = ghOpIncome - ghDebt;
    }
    newNetCFs.push(ghNetCF);
  }

  updateChart(labels, existNetCFs, newNetCFs);
  updateTable(annualRevenue, annualOpEx, annualDebtSvc, equity, prodOpenYear, firstYearProdFrac, startYear, s);
}

function updateChart(labels, existNetCFs, newNetCFs) {
  const ctx = document.getElementById('chart').getContext('2d');

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = existNetCFs;
    chart.data.datasets[1].data = newNetCFs;
    chart.update();
    return;
  }

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Existing Net CF', data: existNetCFs, backgroundColor: '#4a8acc', borderRadius: 2, order: 1 },
        { label: 'New GH Net CF', data: newNetCFs, backgroundColor: '#5aaa55', borderRadius: 2, order: 0 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0a150a',
          borderColor: '#3a5a3a',
          borderWidth: 1,
          titleFont: { family: 'monospace', size: 10 },
          bodyFont: { family: 'monospace', size: 11 },
          titleColor: '#5a9e55',
          callbacks: { label: (ctx) => `${ctx.dataset.label}: ${fmtK(ctx.parsed.y)}` }
        }
      },
      scales: {
        x: {
          stacked: true,
          ticks: { font: { family: 'monospace', size: 14 }, color: '#4a7a4a' },
          grid: { display: false }
        },
        y: {
          stacked: true,
          position: 'left',
          ticks: { font: { family: 'monospace', size: 14 }, color: '#4a7a4a', callback: v => fmtK(v) },
          grid: { display: false }
        }
      }
    }
  });
}

function updateTable(annualRevenue, annualOpEx, annualDebtSvc, equity, prodOpenYear, firstYearProdFrac, constructionStartYear, s) {
  const years = [2026, 2027, 2028, 2029, 2030, 2031, 2032, 2033, 2034, 2035];
  const table = document.getElementById('finTable');

  // Table formatter: 1 decimal, no M, use - for negatives
  const fmtCell = (n) => {
    if (n === 0) return '\u2014';
    const abs = Math.abs(n);
    const sign = n < 0 ? '-' : '';
    let str;
    if (abs >= 1e6) str = `${(abs / 1e6).toFixed(1)}`;
    else if (abs >= 1e3) str = `${(abs / 1e3).toFixed(1)}`;
    else str = abs.toFixed(1);
    // For millions show as X.X, for thousands show as 0.X etc — let's just always show in millions with 1 decimal
    const inM = abs / 1e6;
    str = inM.toFixed(1);
    if (n < 0) return `<span class="neg">-${str}</span>`;
    return str;
  };

  const existRev = [], existExp = [], existDebt = [];
  const newRevArr = [], newExpArr = [], newDebtArr = [], equityOutlay = [];

  for (let i = 0; i < years.length; i++) {
    const year = years[i];
    const yrIdx = year - 2026;

    // Existing — escalation from sliders applies
    const eRev = EXISTING_REV_BASE * Math.pow(1 + s.revInflation / 100, yrIdx);
    const eExp = EXISTING_EXP_BASE * Math.pow(1 + s.costInflation / 100, yrIdx);
    const eDebt = year <= EXISTING_DEBT_CUTOFF ? EXISTING_DEBT_HIGH : EXISTING_DEBT_LOW;
    existRev.push(eRev);
    existExp.push(eExp);
    existDebt.push(eDebt);

    // Equity outlay during construction
    let eqOut = 0;
    if (year >= constructionStartYear && year < prodOpenYear) {
      const cYears = prodOpenYear - constructionStartYear;
      if (cYears > 0) eqOut = equity / cYears;
    }
    equityOutlay.push(eqOut);

    // New GH
    const prodYr = year - prodOpenYear;
    let nRev = 0, nExp = 0, nDebt = 0;
    if (prodYr >= 0) {
      const actualProdYr = prodYr + 1;
      let r = rampFactor(actualProdYr, s.rampYears);
      if (prodYr === 0 && firstYearProdFrac < 1) r *= firstYearProdFrac;
      const revMult = Math.pow(1 + s.revInflation / 100, prodYr);
      const cstMult = Math.pow(1 + s.costInflation / 100, prodYr);
      nRev = annualRevenue * r * revMult;
      nExp = annualOpEx * r * cstMult;
      const loanYr = year - prodOpenYear + 1;
      nDebt = loanYr <= s.loanTermYears ? annualDebtSvc : 0;
      if (prodYr === 0 && firstYearProdFrac < 1) nDebt *= firstYearProdFrac;
    }
    newRevArr.push(nRev);
    newExpArr.push(nExp);
    newDebtArr.push(nDebt);
  }

  const yearHeaders = years.map(y => `<th>'${String(y).slice(2)}</th>`).join('');

  const row = (label, data, cls) =>
    `<tr${cls ? ` class="${cls}"` : ''}><td>${label}</td>${data.map(v => `<td>${fmtCell(v)}</td>`).join('')}</tr>`;

  const sectionRow = (label) =>
    `<tr class="section-header"><td colspan="${years.length + 1}">${label}</td></tr>`;

  // Compute derived rows
  const existNetCF = years.map((_, i) => existRev[i] - existExp[i] - existDebt[i]);
  const newOpInc = years.map((_, i) => newRevArr[i] - newExpArr[i]);
  const newNetCF = years.map((_, i) => {
    if (newRevArr[i] === 0 && newExpArr[i] === 0 && equityOutlay[i] === 0) return 0;
    return newRevArr[i] - newExpArr[i] - newDebtArr[i] - equityOutlay[i];
  });
  const totalRev = years.map((_, i) => existRev[i] + newRevArr[i]);
  const totalExp = years.map((_, i) => existExp[i] + newExpArr[i]);
  const totalOpInc = years.map((_, i) => totalRev[i] - totalExp[i]);
  const totalDebt = years.map((_, i) => existDebt[i] + newDebtArr[i]);
  const totalEquity = equityOutlay;
  const totalNetCF = years.map((_, i) => totalOpInc[i] - totalDebt[i] - equityOutlay[i]);

  table.innerHTML = `
    <thead><tr><th></th>${yearHeaders}</tr></thead>
    <tbody>
      ${sectionRow('Existing Operations')}
      ${row('Revenue', existRev)}
      ${row('Expenses', existExp.map(v => -v))}
      ${row('Debt Service', existDebt.map(v => -v))}
      ${row('Existing Net CF', existNetCF, 'subtotal-row')}

      ${sectionRow('New Greenhouse')}
      ${row('Equity Outlay', equityOutlay.map(v => v === 0 ? 0 : -v))}
      ${row('Revenue', newRevArr)}
      ${row('Expenses', newExpArr.map(v => v === 0 ? 0 : -v))}
      ${row('Debt Service', newDebtArr.map(v => v === 0 ? 0 : -v))}
      ${row('New GH Net CF', newNetCF, 'subtotal-row')}

      ${sectionRow('Consolidated')}
      ${row('Total Revenue', totalRev)}
      ${row('Total Expenses', totalExp.map(v => -v))}
      ${row('Operating Income', totalOpInc)}
      ${row('Total Debt Service', totalDebt.map(v => -v))}
      ${row('Equity Outlay', totalEquity.map(v => v === 0 ? 0 : -v))}
      ${row('Net Cash Flow', totalNetCF, 'total-row-table')}
    </tbody>
  `;
}

function saveModel() {
  localStorage.setItem('gh-model-state', JSON.stringify(state));
  localStorage.setItem('gh-model-theme', document.body.classList.contains('light') ? 'light' : 'dark');
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'saved!';
  setTimeout(() => { btn.textContent = 'save model'; }, 1500);
}

function loadSavedModel() {
  const saved = localStorage.getItem('gh-model-state');
  if (saved) {
    const parsed = JSON.parse(saved);
    Object.assign(state, parsed);
  }
  const theme = localStorage.getItem('gh-model-theme');
  if (theme === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = 'dark';
  }
}

function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  document.getElementById('themeToggle').textContent = isLight ? 'dark' : 'light';
  // Rebuild slider track colors
  document.querySelectorAll('input[type=range]').forEach(input => {
    const key = input.id;
    if (state[key] !== undefined) {
      const opts = sliderOpts[key];
      if (opts) {
        const pct = ((state[key] - opts.min) / (opts.max - opts.min)) * 100;
        const fill = getComputedStyle(document.documentElement).getPropertyValue('--slider-fill').trim();
        const track = getComputedStyle(document.documentElement).getPropertyValue('--slider-track').trim();
        input.style.background = `linear-gradient(to right,${fill} 0%,${fill} ${pct}%,${track} ${pct}%,${track} 100%)`;
      }
    }
  });
  // Rebuild chart with new colors
  if (chart) {
    const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim();
    const tickColor = getComputedStyle(document.documentElement).getPropertyValue('--chart-tick').trim();
    chart.options.scales.x.ticks.color = tickColor;
    chart.options.scales.x.grid.color = gridColor;
    chart.options.scales.y.ticks.color = tickColor;
    chart.options.scales.y.grid.color = gridColor;
    chart.update();
  }
}

// Store slider opts for theme toggle
const sliderOpts = {};
const _origCreateSlider = createSlider;
createSlider = function(containerId, key, opts) {
  sliderOpts[key] = opts;
  _origCreateSlider(containerId, key, opts);
  // Also patch the input handler to use CSS var colors
  const input = document.getElementById(key);
  const origHandler = input.oninput;
  input.addEventListener('input', () => {
    const fill = getComputedStyle(document.documentElement).getPropertyValue('--slider-fill').trim();
    const track = getComputedStyle(document.documentElement).getPropertyValue('--slider-track').trim();
    const pct = ((state[key] - opts.min) / (opts.max - opts.min)) * 100;
    input.style.background = `linear-gradient(to right,${fill} 0%,${fill} ${pct}%,${track} ${pct}%,${track} 100%)`;
  });
};

loadSavedModel();
buildSliders();
recalc();
</script>
